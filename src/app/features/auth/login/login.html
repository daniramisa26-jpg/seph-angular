<div class="login-page">

  <section class="login-left">
    <img
      class="logo-hidalgo"
      src="/imagenes/logoHidalgo.svg"
      alt="Hidalgo Educación">

    <div class="dges-box">
      <img
        class="logo-dges"
        src="/imagenes/DGES-Login.svg"
        alt="DGES">
    </div>

    <img
      class="img-letras"
      src="/imagenes/Group.svg"
      alt="hidalgo.gob.mx">
  </section>

  <section class="login-right">
    <div class="login-card">

      <label>Correo Electrónico</label>
      <input
        type="email"
        [(ngModel)]="form.email">
<label>Contraseña</label>

<div class="password-container">
  <input
    [type]="mostrarPassword ? 'text' : 'password'"
    [(ngModel)]="form.password">

  <button
    type="button"
    class="toggle-password"
    (click)="togglePassword()">

    <span class="material-symbols-outlined">
      {{ mostrarPassword ? 'visibility_off' : 'visibility' }}
    </span>

  </button>
</div>
      <button
        (click)="login()"
        [disabled]="loading()">

        @if (loading()) {
          Cargando...
        } @else {
          Acceder
        }

      </button>

      @if (error()) {
        <p class="error-message">
          {{ error() }}
        </p>
      }

    </div>
  </section>

</div>
